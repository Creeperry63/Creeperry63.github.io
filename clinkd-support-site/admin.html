<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clinkd Admin</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="admin-top">
        <div>
          <div class="badge">Admin</div>
          <h1>Support tickets</h1>
          <p>View tickets, mark them handled, and reply from your email app.</p>
        </div>
        <button id="logoutBtn" class="secondary hidden">Log out</button>
      </div>

      <form id="loginForm" class="form">
        <label>
          Admin email
          <input id="adminEmail" type="email" placeholder="you@example.com" required>
        </label>

        <label>
          Password
          <input id="adminPassword" type="password" placeholder="Your Supabase password" required>
        </label>

        <button type="submit">Log in</button>
        <p id="loginStatus" class="status" role="status"></p>
      </form>

      <section id="ticketsPanel" class="hidden">
        <div class="toolbar">
          <button id="refreshBtn" class="secondary">Refresh</button>
          <select id="statusFilter">
            <option value="open">Open</option>
            <option value="all">All</option>
            <option value="closed">Closed</option>
          </select>
        </div>

        <div id="tickets" class="tickets"></div>
      </section>
    </section>

    <footer>
      <a href="index.html">Back to support</a>
      <span>© 2026 Ryan McKenna</span>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
